<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Base del portátil -->
  <rect x="60" y="180" width="280" height="18" rx="4" fill="#2A2A2A"/>
  <rect x="40" y="192" width="320" height="8" rx="3" fill="#1A1A1A"/>
  <!-- Teclado area -->
  <rect x="75" y="185" width="250" height="10" rx="2" fill="#333"/>
  <!-- Pantalla base -->
  <rect x="80" y="60" width="240" height="125" rx="6" fill="#1A1A1A"/>
  <!-- Pantalla -->
  <rect x="88" y="68" width="224" height="109" rx="3" fill="#0D1117"/>
  <!-- Contenido pantalla - código/dashboard -->
  <rect x="96" y="76" width="80" height="6" rx="2" fill="#F06A00" opacity="0.8"/>
  <rect x="96" y="88" width="120" height="4" rx="2" fill="#444"/>
  <rect x="96" y="98" width="90" height="4" rx="2" fill="#444"/>
  <rect x="96" y="108" width="110" height="4" rx="2" fill="#444"/>
  <rect x="96" y="118" width="70" height="4" rx="2" fill="#F06A00" opacity="0.5"/>
  <rect x="96" y="128" width="100" height="4" rx="2" fill="#444"/>
  <rect x="96" y="138" width="85" height="4" rx="2" fill="#444"/>
  <rect x="96" y="148" width="95" height="4" rx="2" fill="#444"/>
  <!-- Barra lateral derecha pantalla -->
  <rect x="230" y="76" width="74" height="101" rx="2" fill="#111"/>
  <rect x="236" y="82" width="62" height="18" rx="2" fill="#F06A00" opacity="0.15"/>
  <rect x="236" y="106" width="62" height="18" rx="2" fill="#333"/>
  <rect x="236" y="130" width="62" height="18" rx="2" fill="#333"/>
  <rect x="236" y="154" width="62" height="18" rx="2" fill="#333"/>
  <!-- Logo marca en pantalla -->
  <circle cx="200" cy="172" r="3" fill="#333"/>
  <!-- Bisagra -->
  <rect x="78" y="183" width="244" height="4" rx="2" fill="#222"/>
  <!-- Touchpad -->
  <rect x="160" y="190" width="80" height="2" rx="1" fill="#444"/>
