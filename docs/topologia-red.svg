<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Fondo -->
  <rect width="900" height="620" fill="#0D0D0D" rx="12"/>
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22C55E"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F06A00"/>
    </marker>
  </defs>

  <!-- Título -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#F06A00" letter-spacing="2">TOPOLOGÍA DE RED — ECONOVA</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#666" letter-spacing="1">Red 192.168.1.0/24 · Dominio econova.local · Proxmox VE 9.x</text>

  <!-- ── INTERNET ─────────────────────────────────────────── -->
  <g transform="translate(390,75)">
    <circle cx="60" cy="28" r="26" fill="#1A1D24" stroke="#2A2E38" stroke-width="1.5"/>
    <!-- Icono globo simplificado -->
    <circle cx="60" cy="28" r="16" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <ellipse cx="60" cy="28" rx="8" ry="16" fill="none" stroke="#3B82F6" stroke-width="1"/>
    <line x1="44" y1="28" x2="76" y2="28" stroke="#3B82F6" stroke-width="1"/>
    <text x="60" y="66" text-anchor="middle" font-size="10" fill="#9AA3B2">INTERNET</text>
  </g>

  <!-- Línea Internet → Router -->
  <line x1="450" y1="130" x2="450" y2="158" stroke="#2A2E38" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- ── ROUTER ─────────────────────────────────────────────── -->
  <g transform="translate(390,158)">
    <rect width="120" height="44" rx="6" fill="#1A1D24" stroke="#2A2E38" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="44" rx="3" fill="#3B82F6"/>
    <text x="66" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#F0F2F5">Router Casa</text>
    <text x="66" y="33" text-anchor="middle" font-size="10" fill="#9AA3B2">192.168.1.1</text>
  </g>

  <!-- Línea Router → Switch -->
  <line x1="450" y1="202" x2="450" y2="238" stroke="#2A2E38" stroke-width="2"/>

  <!-- ── SWITCH ──────────────────────────────────────────────── -->
  <g transform="translate(330,238)">
    <rect width="240" height="44" rx="6" fill="#1A1D24" stroke="#F06A00" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="44" rx="3" fill="#F06A00"/>
    <text x="123" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#F0F2F5">Switch TP-Link TL-SG608E</text>
    <text x="123" y="33" text-anchor="middle" font-size="10" fill="#9AA3B2">8 puertos Gigabit gestionable</text>
  </g>

  <!-- Líneas del switch a los 4 nodos -->
  <!-- Switch → Proxmox -->
  <line x1="370" y1="282" x2="180" y2="330" stroke="#2A2E38" stroke-width="1.5"/>
  <!-- Switch → VM1 -->
  <line x1="420" y1="282" x2="380" y2="330" stroke="#2A2E38" stroke-width="1.5"/>
  <!-- Switch → VM2 -->
  <line x1="480" y1="282" x2="520" y2="330" stroke="#2A2E38" stroke-width="1.5"/>
  <!-- Switch → Portátil -->
  <line x1="530" y1="282" x2="720" y2="330" stroke="#2A2E38" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ── PROXMOX HOST ────────────────────────────────────────── -->
  <g transform="translate(80,330)">
    <rect width="200" height="80" rx="6" fill="#1A1D24" stroke="#E57000" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="80" rx="3" fill="#E57000"/>
    <text x="103" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#E57000" letter-spacing="1">PROXMOX HOST</text>
    <text x="103" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#F0F2F5">NucBox K12</text>
    <text x="103" y="51" text-anchor="middle" font-size="10" fill="#9AA3B2">192.168.1.100</text>
    <text x="103" y="65" text-anchor="middle" font-size="9" fill="#666">Proxmox VE 9.x · :8006</text>
  </g>

  <!-- ── VM1 WEB ──────────────────────────────────────────────── -->
  <g transform="translate(295,330)">
    <rect width="180" height="130" rx="6" fill="#1A1D24" stroke="#F06A00" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="30" rx="6" fill="#F06A00"/>
    <rect x="0" y="24" width="180" height="6" fill="#F06A00"/>
    <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF" letter-spacing="1">VM1 · WEB-ECONOVA</text>
    <text x="90" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#F0F2F5">192.168.1.101</text>
    <text x="90" y="64" text-anchor="middle" font-size="9" fill="#9AA3B2">Windows Server 2022</text>
    <text x="90" y="80" text-anchor="middle" font-size="9" fill="#9AA3B2">4 vCPU · 8 GB · 80 GB</text>
    <!-- Servicios -->
    <rect x="10" y="88" width="160" height="16" rx="3" fill="#111318"/>
    <text x="90" y="100" text-anchor="middle" font-size="8.5" fill="#F06A00">XAMPP · Intranet :8080</text>
    <rect x="10" y="107" width="160" height="16" rx="3" fill="#111318"/>
    <text x="90" y="119" text-anchor="middle" font-size="8.5" fill="#F06A00">FileZilla FTP · Tailscale</text>
  </g>

  <!-- ── VM2 DC ────────────────────────────────────────────────── -->
  <g transform="translate(495,330)">
    <rect width="180" height="130" rx="6" fill="#1A1D24" stroke="#3B82F6" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="30" rx="6" fill="#3B82F6"/>
    <rect x="0" y="24" width="180" height="6" fill="#3B82F6"/>
    <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#FFF" letter-spacing="1">VM2 · DC-ECONOVA</text>
    <text x="90" y="48" text-anchor="middle" font-size="11" font-weight="600" fill="#F0F2F5">192.168.1.102</text>
    <text x="90" y="64" text-anchor="middle" font-size="9" fill="#9AA3B2">Windows Server 2022</text>
    <text x="90" y="80" text-anchor="middle" font-size="9" fill="#9AA3B2">4 vCPU · 8 GB · 80 GB</text>
    <rect x="10" y="88" width="160" height="16" rx="3" fill="#111318"/>
    <text x="90" y="100" text-anchor="middle" font-size="8.5" fill="#3B82F6">AD DS · DNS · DHCP</text>
    <rect x="10" y="107" width="160" height="16" rx="3" fill="#111318"/>
    <text x="90" y="119" text-anchor="middle" font-size="8.5" fill="#3B82F6">econova.local</text>
  </g>

  <!-- ── PORTÁTIL ALUMNO ─────────────────────────────────────── -->
  <g transform="translate(650,330)">
    <rect width="170" height="80" rx="6" fill="#1A1D24" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3"/>
    <rect x="0" y="0" width="6" height="80" rx="3" fill="#22C55E"/>
    <text x="88" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#22C55E">PORTÁTIL ALUMNO</text>
    <text x="88" y="36" text-anchor="middle" font-size="10" fill="#9AA3B2">IP dinámica (DHCP)</text>
    <text x="88" y="51" text-anchor="middle" font-size="10" fill="#9AA3B2">Datos móviles</text>
    <text x="88" y="65" text-anchor="middle" font-size="9" fill="#22C55E">↔ Tailscale VPN</text>
  </g>

  <!-- ── VM3 PC (debajo de VM2) ─────────────────────────────── -->
  <!-- Línea VM2 → VM3 -->
  <line x1="585" y1="460" x2="585" y2="498" stroke="#2A2E38" stroke-width="1.5"/>
  <g transform="translate(495,498)">
    <rect width="180" height="80" rx="6" fill="#1A1D24" stroke="#22C55E" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="80" rx="3" fill="#22C55E"/>
    <text x="93" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#22C55E" letter-spacing="1">VM3 · PC-ECONOVA</text>
    <text x="93" y="36" text-anchor="middle" font-size="11" font-weight="600" fill="#F0F2F5">192.168.1.103</text>
    <text x="93" y="51" text-anchor="middle" font-size="9" fill="#9AA3B2">Windows 10 Pro</text>
    <text x="93" y="65" text-anchor="middle" font-size="9" fill="#9AA3B2">2 vCPU · 6 GB · 60 GB · empleado01</text>
  </g>

  <!-- ── TAILSCALE (flecha externa) ────────────────────────── -->
  <!-- Línea Tailscale portátil → VM1 -->
  <path d="M 735 370 Q 820 370 820 460 Q 820 550 475 460" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- Flecha Tailscale portátil → Proxmox -->
  <path d="M 650 380 Q 580 500 280 410" fill="none" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>


  <!-- ── LEYENDA ─────────────────────────────────────────────── -->
  <g transform="translate(30,530)">
    <text x="0" y="0" font-size="9" fill="#666" letter-spacing="1">LEYENDA</text>
    <!-- Línea sólida -->
    <line x1="0" y1="14" x2="30" y2="14" stroke="#2A2E38" stroke-width="2"/>
    <text x="36" y="18" font-size="9" fill="#9AA3B2">Conexión de red local (Gigabit)</text>
    <!-- Línea discontinua -->
    <line x1="0" y1="32" x2="30" y2="32" stroke="#22C55E" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="36" y="36" font-size="9" fill="#9AA3B2">Tailscale VPN (WireGuard · cifrado E2E)</text>
    <!-- Línea discontinua gris -->
    <line x1="0" y1="50" x2="30" y2="50" stroke="#2A2E38" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="36" y="54" font-size="9" fill="#9AA3B2">Conexión Internet (datos móviles)</text>
  </g>

  <!-- ── INFO DHCP ───────────────────────────────────────────── -->
  <g transform="translate(430,530)">
    <rect width="200" height="60" rx="4" fill="#111318" stroke="#2A2E38" stroke-width="1"/>
    <text x="100" y="16" text-anchor="middle" font-size="8.5" fill="#F06A00" letter-spacing="1">DHCP · DC-ECONOVA</text>
    <text x="100" y="30" text-anchor="middle" font-size="9" fill="#9AA3B2">Rango: 192.168.1.150 – .200</text>
    <text x="100" y="44" text-anchor="middle" font-size="9" fill="#9AA3B2">DNS: 192.168.1.102</text>
    <text x="100" y="58" text-anchor="middle" font-size="9" fill="#9AA3B2">Dominio: econova.local</text>
  </g>

  <!-- ── INFO TAILSCALE ─────────────────────────────────────── -->
  <g transform="translate(650,530)">
    <rect width="200" height="60" rx="4" fill="#111318" stroke="#22C55E" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="100" y="16" text-anchor="middle" font-size="8.5" fill="#22C55E" letter-spacing="1">TAILSCALE ZERO TRUST</text>
    <text x="100" y="30" text-anchor="middle" font-size="9" fill="#9AA3B2">VM1: 100.x.x.x</text>
    <text x="100" y="44" text-anchor="middle" font-size="9" fill="#9AA3B2">Sin apertura de puertos</text>
    <text x="100" y="58" text-anchor="middle" font-size="9" fill="#9AA3B2">WireGuard · cifrado extremo a extremo</text>
  </g>
</svg>
