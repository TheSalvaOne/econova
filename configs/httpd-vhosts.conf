# ============================================================
# httpd-vhosts.conf — VirtualHost intranet EcoNova
# Archivo: C:\xampp\apache\conf\extra\httpd-vhosts.conf
# Puerto: 8080 (requiere "Listen 8080" en httpd.conf)
# ============================================================

# Asegurar que Apache escucha en el puerto 8080
# Anadir en C:\xampp\apache\conf\httpd.conf:
# Listen 8080

<VirtualHost *:8080>
    ServerName intranet.econova.local
    DocumentRoot "C:/xampp/htdocs/intranet"

    <Directory "C:/xampp/htdocs/intranet">
        Options -Indexes
        AllowOverride All
        Order Deny,Allow
        Deny from all
        # Red local
        Allow from 192.168.1.0/24
        # Tailscale (Zero Trust)
        Allow from 100.64.0.0/10
        # Localhost
        Allow from 127.0.0.1
    </Directory>

    # Proteger carpeta de datos JSON
    <Directory "C:/xampp/htdocs/intranet/data">
        Order Deny,Allow
        Deny from all
    </Directory>

    ErrorLog  "C:/xampp/apache/logs/intranet_error.log"
    CustomLog "C:/xampp/apache/logs/intranet_access.log" combined
</VirtualHost>
